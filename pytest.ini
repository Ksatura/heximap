[pytest]
# HEXIMAP test konfigürasyonu

# Test keşfi
testpaths = .
python_files = integration_test_*.py
python_classes = Test*
python_functions = test_*

# Varsayılan seçenekler
addopts =
    --tb=short
    --strict-markers
    -q

# Timeout (saniye) — tek bir test bu süreyi aşarsa fail
timeout = 120

# Özel işaretler (markers)
markers =
    requires_open3d: open3d kütüphanesi gerektiren testler (CI'da atlanır)
    slow: Yavaş testler (isteğe bağlı olarak -m "not slow" ile atlanabilir)
